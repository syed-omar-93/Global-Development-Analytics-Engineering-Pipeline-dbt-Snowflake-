version: 2

models:
  - name: core_all_countries_populations
    description: "Model to identify all countries and their populations based on the most recent data"
    columns:
      - name: country
        description: "country name"
        tests:
          - not_null
          - unique  
          - relationships:
             arguments:
              to: ref('stg_population')
              field: country
      - name: country_population 
        description: "population of the country based on 2024 data"
      - name: population_ranking
        description: "ranking of the country based on population in 2024"

  - name: core_yearly_populations
    description: "Model calculating the population each year for the most populous countries from 2020 to 2024"
    columns:
      - name: country
        description: "country name"
        tests:
          - not_null
          - unique
          - relationships:
             arguments: 
               to: ref('stg_population')
               field: country
      - name: population_2024
        description: "population of the country in 2024"
      - name: population_2023
        description: "population of the country in 2023"
      - name: population_2022
        description: "population of the country in 2022"                      
      - name: population_2021
        description: "population of the country in 2021"
      - name: population_2020
        description: "population of the country in 2020"


