version: 2

models:
  - name: core_all_countries_populations
    description: "Core model for all countries and their populations based on the most recent figures"
    columns:
      - name: country
        description: "Name of the country"
        tests:
          - not_null
          - unique  
          - relationships:
             arguments:
              to: ref('stg_population')
              field: country
      - name: country_population 
        description: "Population of the country based on 2024 data"
        tests:
          - not_null
      - name: population_ranking
        description: "Ranking of each country based on its 2024 population"
        tests:
          - not_null

  - name: core_yearly_populations
    description: "Core model for yearly populations for countries from 2020 to 2024"
    columns:
      - name: country
        description: "Name of the country"
        tests:
          - not_null
          - unique
          - relationships:
             arguments: 
               to: ref('stg_population')
               field: country
      - name: population_2024
        description: "population of the country in 2024"
        tests:
          - not_null
      - name: population_2023
        description: "population of the country in 2023"
        tests:
          - not_null
      - name: population_2022
        description: "population of the country in 2022"
        tests:
          - not_null
      - name: population_2021
        description: "population of the country in 2021"
        tests:
          - not_null
      - name: population_2020
        description: "population of the country in 2020"
        tests:
          - not_null

  - name: core_all_countries_gdp_per_capita
    description: "Core model for all countries and their GDP per capita based on the most recent figures"
    columns:
      - name: country
        description: "Name of the country"
        tests:
          - not_null
          - unique
          - relationships:
             arguments: 
               to: ref('stg_gdp')
               field: country
      - name: gdp_per_capita
        description: "GDP per capita of the country based on the most recent year's data"
        tests:
          - not_null
      - name: gdp_per_capita_ranking
        description: "Ranking of each country based on its most recent GDP per capita"
        tests:
          - not_null

  - name: core_yearly_gdp_per_capitas
    description: "Core model for yearly GDP per capita for countries from 2020 to 2024"
    columns:
      - name: country
        description: "Name of the country"
        tests:
          - not_null
          - unique
          - relationships:
             arguments: 
               to: ref('stg_gdp')
               field: country
      - name: gdp_per_capita_2024
        description: "GDP per capita of the country in 2024"
        tests:
          - not_null
      - name: gdp_per_capita_2023
        description: "GDP per capita of the country in 2023"
        tests:
          - not_null
      - name: gdp_per_capita_2022
        description: "GDP per capita of the country in 2022"
        tests:
          - not_null
      - name: gdp_per_capita_2021
        description: "GDP per capita of the country in 2021"
        tests:
          - not_null
      - name: gdp_per_capita_2020
        description: "GDP per capita of the country in 2020"
        tests:
          - not_null

  - name: core_all_countries_life_expectancies
    description: "Core model for all countries and their life expectancies based on the most recent figures"
    columns:
      - name: country
        description: "Name of the country"
        tests:
          - not_null
          - unique
          - relationships:
             arguments: 
               to: ref('stg_life_expectancy')
               field: country
      - name: life_expectancy
        description: "Life expectancy of the country based on the most recent year's data"
        tests:
          - not_null
      - name: life_expectancy_ranking
        description: "Ranking of each country based on its most recent life expectancy"
        tests:
          - not_null

  - name: core_yearly_life_expectancies
    description: "Core model for yearly life expectancies for countries from 2020 to 2024"
    columns:
      - name: country
        description: "Name of the country"
        tests:
          - not_null
          - unique
          - relationships:
             arguments: 
               to: ref('stg_life_expectancy')
               field: country
      - name: life_expectancy_2024
        description: "Life expectancy of the country in 2024"
        tests:
          - not_null
      - name: life_expectancy_2023
        description: "Life expectancy of the country in 2023"
        tests:
          - not_null
      - name: life_expectancy_2022
        description: "Life expectancy of the country in 2022"
        tests:
          - not_null
      - name: life_expectancy_2021
        description: "Life expectancy of the country in 2021"
        tests:
          - not_null
      - name: life_expectancy_2020
        description: "Life expectancy of the country in 2020"
        tests:
          - not_null


