version: 2

models:
  - name: stg_gdp
    description: "Staging model for GDP per capita data"
    columns:
      - name: country
        description: "Name of the country"
        data_tests:
          - not_null
      - name: country_code
        description: "Code of the country"
        data_tests:
          - not_null
      - name: year
        description: "Year value"
        data_tests:
          - not_null
      - name: gdp_per_capita
        description: "GDP per capita value"

  - name: stg_life_expectancy
    description: "Staging model for life expectancy data"
    columns:
      - name: country
        description: "Name of the country"
        data_tests:
          - not_null
      - name: country_code
        description: "Code of the country"
        data_tests:
          - not_null
      - name: year
        description: "Year value"
        data_tests:
          - not_null
      - name: life_expectancy
        description: "Life expectancy value"

  - name: stg_population
    description: "Staging model for population data"
    columns:
      - name: country
        description: "Name of the country"
        data_tests:
          - not_null
      - name: country_code
        description: "Code of the country"
        data_tests:
          - not_null
      - name: year
        description: "Year value"
        data_tests:
          - not_null
      - name: country_population
        description: "Population value"

